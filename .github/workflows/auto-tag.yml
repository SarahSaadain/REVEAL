name: Auto Tag and Release

on:
  push:
    branches:
      - main

jobs:
  tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Bump version and create tag
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: false
          release_branches: main

      - name: Update version in src/version.py and conda/meta.yaml from tag
        if: steps.tag.outputs.new_tag != ''
        run: |
          TAG=${{ steps.tag.outputs.new_tag }}
          VERSION=${TAG#v}
          sed -i "s/^__version__ = .*/__version__ = \"$VERSION\"/" src/version.py
          sed -i "s/^{% set version = .* %}/{% set version = \"$VERSION\" %}/" conda/meta.yaml

      - name: Commit version bump back to main
        if: steps.tag.outputs.new_tag != ''
        run: |
          git config user.name "${{ github.event.head_commit.author.name }}"
          git config user.email "${{ github.event.head_commit.author.email }}"
          git add src/version.py conda/meta.yaml
          git commit -m "chore: sync version to ${{ steps.tag.outputs.new_tag }} [skip ci]" || true
          git push origin HEAD:main

      - name: Create GitHub Release
        if: steps.tag.outputs.new_tag != ''
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.tag.outputs.new_tag }}
          name: REVEAL ${{ steps.tag.outputs.new_tag }}
          generateReleaseNotes: true
